    /* Milestone packages */
    [data-n="9"] { padding: 16px !important; }
    [data-n="9"] > div:nth-child(2) { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }

    /* A la carte */
    [data-n="10"] { padding: 16px !important; }
    [data-n="10"] > div:nth-child(2) { grid-template-columns: 1fr !important; gap: 14px !important; }

    /* Previous work */
    [data-n="11"] { padding: 16px !important; }
    [data-n="11"] > div:nth-child(2) { grid-template-columns: 1fr !important; gap: 12px !important; }
    [data-n="11"] > div:nth-child(2) > div > div:first-child { height: 180px !important; }

    /* Texas 2-step */
    .s10 .lp { padding: 20px !important; }
    .s10 .lp h2 { font-size: 1.4em !important; }
    .s10 .rp { padding: 20px !important; }
    .s10 .kn { font-size: 1.5em !important; }

    /* Perks */
    .s11 { padding: 16px !important; }
    .s11 h2 { font-size: 1.5em !important; }
    .s11 .pgrid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }

    /* Prev work */
    .s13 { padding: 16px !important; }
    .s13 .wgrid { grid-template-columns: 1fr !important; gap: 10px !important; }

    /* Resources */
    [data-n="13"] { padding: 16px !important; }
    [data-n="13"] > div:nth-child(2) { grid-template-columns: 1fr !important; gap: 16px !important; }

    /* CTA */
    .s14 .lp { min-height: 180px !important; padding: 20px !important; }
    .s14 h2 { font-size: 1.8em !important; }
    .s14 .rp { padding: 0 !important; }
