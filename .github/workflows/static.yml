    .s4 .top h2 { font-size: 1.3em !important; }
    .s4 .subnote { text-align: left !important; max-width: 100% !important; }

    /* We know your clients */
    .s5 .lp { min-height: 140px !important; padding: 20px !important; }
    .s5 .lp h2 { font-size: 1.5em !important; }
    .s5 .rp { padding: 20px !important; }

    /* Pain points */
    .s6 .col { padding: 20px !important; }
    .s6 h2 { font-size: 1.3em !important; }

    /* Why feyth */
    .s7 .lp { padding: 20px !important; min-height: 140px !important; }
    .s7 .lp h2 { font-size: 1.8em !important; }
