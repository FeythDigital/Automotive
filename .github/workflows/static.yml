        <div class="cb-head">When the market shrinks,<br>you spend more, not less.</div>
        <div class="cb-body">Cutting ad spend to reduce cost is the instinct that kills revenue. When fewer buyers are in-market, visibility becomes the deciding factor. The dealer who shows up wins the deal. The one who went quiet disappears from consideration entirely.</div>
