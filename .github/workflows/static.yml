  /* ══ CUSTOMER JOURNEY SLIDE ══ */

  /* Dashed line marching animation */
  @keyframes dashMarch {
    to { stroke-dashoffset: -96; }
  }
  .cj-dash {
    stroke-dashoffset: 0;
    animation: dashMarch 2.4s linear infinite;
  }

  /* Card base */
  .cj-card {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-top: 3px solid var(--blue);
    padding: 0.7em 0.75em;
    position: relative;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    font-size: 0.9em;
  }
  .cj-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,255,0.1);
  }

  /* connector lines removed */

  .cj-num {
    font-family: 'Fugaz One', sans-serif;
    font-size: 1.4em;
    color: var(--blue);
    opacity: 0.25;
    line-height: 1;
    margin-bottom: 0.15em;
  }
  .cj-title {
    font-family: 'Fugaz One', sans-serif;
    font-size: 0.75em;
    color: var(--black);
    margin-bottom: 0.35em;
  }
  .cj-body {
    font-family: 'Lexend', sans-serif;
    font-weight: 300;
    font-size: 0.6em;
    color: var(--gray-dark);
    line-height: 1.5;
    margin-bottom: 0.4em;
  }
  .cj-stat {
    font-size: 0.56em;
    color: var(--blue);
    font-weight: 500;
    line-height: 1.4;
    background: var(--blue-light);
    padding: 0.3em 0.4em;
  }

  /* Step-in animation */
  @keyframes cjCardIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .cj-card.cj-bot.visible { animation: cjCardIn 0.45s ease forwards; }
  .cj-top.visible { animation: cjCardIn 0.45s ease forwards; }

  /* Mobile: stack road cards vertically */
  @media (max-width: 767px) {
    .cj-road { display: none; }
    .cj-wrap > div:last-child { flex-direction: column !important; gap: 12px !important; }
    .cj-card { width: 100% !important; margin-top: 0 !important; opacity: 1 !important; }
    .cj-top::after, .cj-bot::before { display: none; }
  }
  @media (max-width: 1059px) and (min-width: 768px) {
    .cj-road { display: none; }
    .cj-wrap > div:last-child { flex-wrap: wrap !important; gap: 10px !important; }
    .cj-card { width: 48% !important; margin-top: 0 !important; opacity: 1 !important; }
    .cj-top::after, .cj-bot::before { display: none; }
  }

  /* ══ LEGO MILESTONE SLIDE ══ */

  .lb-slide {
    display: flex;
    flex-direction: column;
    padding: 2.8% 4% 2%;
    font-size: 1.42vw;
    overflow: hidden;
    background: #f5f5f5;
    position: relative;
  }

  /* Subtle grid bg */
  .lb-slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,255,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  .lb-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-shrink: 0;
    margin-bottom: 0.5em;
    position: relative;
    z-index: 1;
  }
  .lb-h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2em;
    color: var(--black);
    line-height: 1.0;
    letter-spacing: 0.04em;
  }
  .lb-h2 span { color: var(--blue); }
  .lb-tagline {
    font-size: 0.58em;
    color: var(--gray-mid);
    text-align: right;
    line-height: 1.55;
    max-width: 20em;
  }

  /* Stage: holds blocks + ground */
  .lb-stage {
    flex: 1;
    min-height: 0;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    z-index: 1;
  }

  /* Row of all blocks — staircase ascending left to right */
  .lb-blocks {
    display: flex;
    align-items: flex-end;
    gap: 0.35em;
    width: 100%;
    padding: 0 0.2em;
    height: 100%;
  }

  /* Each block */
  .lb-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    transform: translateY(40px);
    opacity: 0;
    animation: lbRise 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    /* Staircase: each block taller than previous */
    min-width: 0;
  }

  /* Staircase heights via nth-child */
  .lb-block:nth-child(1) .lb-inner { height: 5.5em !important; }
  .lb-block:nth-child(2) .lb-inner { height: 7.5em !important; }
  .lb-block:nth-child(3) .lb-inner { height: 9.5em !important; }
  .lb-block:nth-child(4) .lb-inner { height: 11.5em !important; }
  .lb-block:nth-child(5) .lb-inner { height: 13.5em !important; }
  .lb-block:nth-child(6) .lb-inner { height: 15.5em !important; }

  @keyframes lbRise {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  /* Stud row (lego bumps) */
  .lb-block svg ellipse {
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.3));
  }

  /* Inner block content */
  .lb-inner {
    width: 100%;
    padding: 0.7em 0.75em;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  /* Sheen effect on right edge */
  .lb-inner::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 6px;
    height: 100%;
    background: rgba(255,255,255,0.12);
  }

  .lb-block:hover .lb-inner {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,255,0.25);
  }

  .lb-num {
    font-family: 'Fugaz One', sans-serif;
    font-size: 0.55em;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.3em;
  }
  .lb-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85em;
    color: #fff;
    line-height: 1.15;
    letter-spacing: 0.04em;
    margin-bottom: 0.5em;
    flex-shrink: 0;
  }
  .lb-items {
    font-size: 0.52em;
    color: rgba(255,255,255,0.82);
    line-height: 1.5;
    flex: 1;
    overflow: hidden;
  }

  /* Ground line */
  .lb-ground {
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--blue), transparent);
    margin-top: 0.3em;
    opacity: 0.4;
  }

  /* Only animate when slide is active */
  .slide:not(.active) .lb-block {
    animation: none;
    transform: translateY(40px);
    opacity: 0;
  }

  /* Responsive */
  @media (max-width: 1059px) {
    .lb-slide { padding: 16px !important; }
    .lb-blocks { flex-wrap: wrap; align-items: flex-start; }
    .lb-block { flex: 0 0 30%; }
    .lb-block .lb-inner { min-height: 120px !important; }
    .lb-h2 { font-size: 1.5em !important; }
  }
  @media (max-width: 767px) {
    .lb-block { flex: 0 0 48%; }
    .lb-block .lb-inner { min-height: 100px !important; }
  }
  @media (max-width: 479px) {
    .lb-block { flex: 0 0 100%; }
  }

  /* Print perk card — highlighted */
  .pk-print {
    border: 1px solid rgba(254,254,0,0.35) !important;
    background: rgba(255,255,255,0.15) !important;
    position: relative;
  }
  /* .pk-print::before removed */
  @media (max-width: 1059px) {
    .s11 .pgrid { grid-template-columns: 1fr 1fr !important; }
    .pk-print { grid-column: 1 / -1 !important; }
  }
  @media (max-width: 767px) {
    .s11 .pgrid { grid-template-columns: 1fr !important; }
    .pk-print { grid-column: 1 !important; grid-template-columns: 1fr !important; flex-direction: column !important; }
  }

  /* Lego block color variety */
  .lb-block:nth-child(1) .lb-inner { background: #0000ee !important; }
  .lb-block:nth-child(2) .lb-inner { background: #0000d6 !important; }
  .lb-block:nth-child(3) .lb-inner { background: #0000c0 !important; }
  .lb-block:nth-child(4) .lb-inner { background: #0000aa !important; }
  .lb-block:nth-child(5) .lb-inner { background: #000096 !important; }
  .lb-block:nth-child(6) .lb-inner { background: #000080 !important; }

  /* Studs color per block */
  .lb-block:nth-child(1) svg ellipse { fill: rgba(255,255,255,0.22) !important; }
  .lb-block:nth-child(6) svg ellipse { fill: rgba(255,255,255,0.35) !important; }

  /* lb-stage fills remaining height properly */
  .lb-stage { flex: 1; min-height: 0; display: flex; flex-direction: column; justify-content: flex-end; }
  .lb-blocks { flex: 1; }

  /* s11 content above blueprint overlay */
  .s11 > *:not(img) { position: relative; z-index: 1; }

  /* Ensure s11 slide number is visible */
  .s11 .slide-num { z-index: 5 !important; color: rgba(255,255,255,0.4) !important; }

  /* ══ BLUEPRINT SVG DRAW-IN ══ */
  #bp-svg .bp, #bp-svg .bp-light {
    stroke-dasharray: 3000;
    stroke-dashoffset: 3000;
  }
  #bp-svg.draw .bp {
    animation: bpDraw 2.4s ease forwards;
  }
  #bp-svg.draw .bp-light {
    animation: bpDraw 3.2s ease forwards;
    animation-delay: 0.3s;
  }
  /* Stagger each path slightly */
  #bp-svg.draw line:nth-child(2)  { animation-delay: 0.05s; }
  #bp-svg.draw line:nth-child(3)  { animation-delay: 0.1s; }
  #bp-svg.draw line:nth-child(4)  { animation-delay: 0.15s; }
  #bp-svg.draw line:nth-child(5)  { animation-delay: 0.2s; }
  #bp-svg.draw line:nth-child(6)  { animation-delay: 0.25s; }
  #bp-svg.draw path:nth-child(1)  { animation-delay: 0.4s; }
  #bp-svg.draw path:nth-child(2)  { animation-delay: 0.55s; }
  #bp-svg.draw path:nth-child(3)  { animation-delay: 0.7s; }

  @keyframes bpDraw {
    to { stroke-dashoffset: 0; }
  }
</style>
</head>
