  .s13 .s13top h2 { font-family: 'Fugaz One', sans-serif; font-size: 1.6em; color: var(--black); }
  .s13 .wgrid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 0.55em; flex: 1; min-height: 0; }
  .s13 .wk { display: flex; flex-direction: column; border: 1px solid #e8e8e8; overflow: hidden; min-height: 0; }
  .s13 .wktop { background: var(--black); padding: 0.65em; flex: 1; display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; }
  .s13 .wktag { font-size: 0.46em; color: var(--blue); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.2em; }
  .s13 .wktit { font-family: 'Fugaz One', sans-serif; font-size: 0.6em; color: #fff; line-height: 1.2; }
  .s13 .wkbot { background: #fff; padding: 0.5em 0.65em; border-top: 2px solid var(--blue); flex-shrink: 0; }
  .s13 .wkres { font-size: 0.54em; color: var(--gray-dark); line-height: 1.45; }
  .s13 .wkres strong { font-weight: 500; color: var(--blue); }
  .s13 .csh .wktop { background: var(--blue); }
  .s13 .csh .wktag { color: rgba(255,255,255,0.55); }

  /* ══ S14 CTA ══ */
  .s14 { background: var(--black); display: grid; grid-template-columns: 1fr 1fr; position: relative; overflow: hidden; }
  .s14::before { content:''; position:absolute; top:0; left:50%; width:1px; height:100%; background:var(--blue); opacity:0.3; }
  .s14 .lp { padding: 5% 4.5%; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
  .s14 .cpre { font-size: 0.52em; color: rgba(255,255,255,0.3); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 0.7em; }
  .s14 h2 { font-family: 'Fugaz One', sans-serif; font-size: 2.5em; color: #fefe00; line-height: 0.93; }
  .s14 h2 span { color: #fff; }
  .s14 .csub { font-size: 0.6em; color: rgba(255,255,255,0.75); margin-top: 0.85em; line-height: 1.6; }
  .s14 .rp { padding: 5% 4.5%; display: flex; flex-direction: column; justify-content: center; gap: 0.9em; overflow: hidden; }
  .s14 .ci { display: flex; flex-direction: column; gap: 0.15em; }
  .s14 .cil { font-size: 0.5em; color: var(--blue); letter-spacing: 0.18em; text-transform: uppercase; }
  .s14 .civ { font-family: 'Fugaz One', sans-serif; font-size: 0.9em; color: #fefe00; }
  .s14 .cbtn { display: inline-block; background: var(--blue); color: #fff; font-family: 'Fugaz One', sans-serif; font-size: 0.62em; padding: 0.6em 1.2em; letter-spacing: 0.07em; width: fit-content; margin-top: 0.3em; cursor: pointer; }
  .s14 .bbg { position: absolute; bottom: 0.7em; right: 1.2em; font-family: 'Fugaz One', sans-serif; font-size: 0.75em; color: rgba(255,255,255,0.06); letter-spacing: 0.2em; }

  /* ══ FULLSCREEN ══ */
  body.fs .deck-nav { display: none; }
  body.fs .progress-bar { display: none; }
  body.fs { background: #000; padding: 0; }
  body.fs .slides-wrapper { margin-top: 0; max-width: 100%; }
  body.fs .slide { display: none !important; }
  body.fs .slide.active {
    display: grid !important;
    width: 100vw; height: 100vh;
    aspect-ratio: unset;
    font-size: calc(100vw / 74.6); /* keeps same proportional baseline */
  }
  body.fs .s4.active,
  body.fs .s8.active,
  body.fs .s9.active,
  body.fs .s11.active,
  body.fs .s12.active,
  body.fs .s13.active { display: flex !important; }

  /* ══ TRANSITIONS AND ANIMATIONS ══ */

  /* Slide fade+lift enter */
  @keyframes slideEnter {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideExit {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-18px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Staggered child reveals */
  @keyframes childReveal {
    from { opacity: 0; transform: translateX(-14px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes childRevealUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes lineGrow {
    from { width: 0; }
    to   { width: 100%; }
  }
  @keyframes numberCount {
    from { opacity: 0; transform: translateY(10px) scale(0.8); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Base: all slides hidden by default in scroll view */
  .slide { transition: none; }

  /* Active slide entrance animation */
  .slide.entering {
    animation: slideEnter 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .slide.exiting {
    animation: slideExit 0.3s ease-in forwards;
    pointer-events: none;
  }

  /* Stagger children of entering slide */
  .slide.entering .lp,
  .slide.entering .rp,
  .slide.entering .col,
  .slide.entering .s13-top,
  .slide.entering .s8top,
  .slide.entering .s9top,
  .slide.entering .s12top {
    animation: fadeIn 0.4s ease forwards;
    animation-delay: 0.05s;
    opacity: 0;
  }

  /* Cards stagger in grid slides */
  .slide.entering .pill:nth-child(1) { animation: childRevealUp 0.4s ease forwards; animation-delay: 0.15s; opacity: 0; }
  .slide.entering .pill:nth-child(2) { animation: childRevealUp 0.4s ease forwards; animation-delay: 0.25s; opacity: 0; }
  .slide.entering .pill:nth-child(3) { animation: childRevealUp 0.4s ease forwards; animation-delay: 0.35s; opacity: 0; }

  .slide.entering .wc:nth-child(1) { animation: childRevealUp 0.35s ease forwards; animation-delay: 0.1s; opacity: 0; }
  .slide.entering .wc:nth-child(2) { animation: childRevealUp 0.35s ease forwards; animation-delay: 0.18s; opacity: 0; }
  .slide.entering .wc:nth-child(3) { animation: childRevealUp 0.35s ease forwards; animation-delay: 0.26s; opacity: 0; }
  .slide.entering .wc:nth-child(4) { animation: childRevealUp 0.35s ease forwards; animation-delay: 0.34s; opacity: 0; }
  .slide.entering .wc:nth-child(5) { animation: childRevealUp 0.35s ease forwards; animation-delay: 0.42s; opacity: 0; }
  .slide.entering .wc:nth-child(6) { animation: childRevealUp 0.35s ease forwards; animation-delay: 0.50s; opacity: 0; }

  .slide.entering .pk:nth-child(1) { animation: scaleIn 0.4s ease forwards; animation-delay: 0.1s; opacity: 0; }
  .slide.entering .pk:nth-child(2) { animation: scaleIn 0.4s ease forwards; animation-delay: 0.2s; opacity: 0; }
  .slide.entering .pk:nth-child(3) { animation: scaleIn 0.4s ease forwards; animation-delay: 0.3s; opacity: 0; }
  .slide.entering .pk:nth-child(4) { animation: scaleIn 0.4s ease forwards; animation-delay: 0.4s; opacity: 0; }

  .slide.entering .rc:nth-child(1) { animation: childRevealUp 0.35s ease forwards; animation-delay: 0.08s; opacity: 0; }
  .slide.entering .rc:nth-child(2) { animation: childRevealUp 0.35s ease forwards; animation-delay: 0.16s; opacity: 0; }
  .slide.entering .rc:nth-child(3) { animation: childRevealUp 0.35s ease forwards; animation-delay: 0.24s; opacity: 0; }
  .slide.entering .rc:nth-child(4) { animation: childRevealUp 0.35s ease forwards; animation-delay: 0.32s; opacity: 0; }
  .slide.entering .rc:nth-child(5) { animation: childRevealUp 0.35s ease forwards; animation-delay: 0.40s; opacity: 0; }
  .slide.entering .rc:nth-child(6) { animation: childRevealUp 0.35s ease forwards; animation-delay: 0.48s; opacity: 0; }

  .slide.entering .ins:nth-child(1) { animation: childRevealUp 0.38s ease forwards; animation-delay: 0.1s; opacity: 0; }
  .slide.entering .ins:nth-child(2) { animation: childRevealUp 0.38s ease forwards; animation-delay: 0.2s; opacity: 0; }
  .slide.entering .ins:nth-child(3) { animation: childRevealUp 0.38s ease forwards; animation-delay: 0.3s; opacity: 0; }
  .slide.entering .ins:nth-child(4) { animation: childRevealUp 0.38s ease forwards; animation-delay: 0.4s; opacity: 0; }
  .slide.entering .ins:nth-child(5) { animation: childRevealUp 0.38s ease forwards; animation-delay: 0.5s; opacity: 0; }

  .slide.entering .care:nth-child(1) { animation: childReveal 0.38s ease forwards; animation-delay: 0.12s; opacity: 0; }
  .slide.entering .care:nth-child(2) { animation: childReveal 0.38s ease forwards; animation-delay: 0.22s; opacity: 0; }
  .slide.entering .care:nth-child(3) { animation: childReveal 0.38s ease forwards; animation-delay: 0.32s; opacity: 0; }
  .slide.entering .care:nth-child(4) { animation: childReveal 0.38s ease forwards; animation-delay: 0.42s; opacity: 0; }

  .slide.entering .pi:nth-child(1) { animation: childReveal 0.35s ease forwards; animation-delay: 0.1s; opacity: 0; }
  .slide.entering .pi:nth-child(2) { animation: childReveal 0.35s ease forwards; animation-delay: 0.19s; opacity: 0; }
  .slide.entering .pi:nth-child(3) { animation: childReveal 0.35s ease forwards; animation-delay: 0.28s; opacity: 0; }
  .slide.entering .pi:nth-child(4) { animation: childReveal 0.35s ease forwards; animation-delay: 0.37s; opacity: 0; }

  .slide.entering .agbox:nth-child(1) { animation: childReveal 0.35s ease forwards; animation-delay: 0.1s; opacity: 0; }
  .slide.entering .agbox:nth-child(2) { animation: childReveal 0.35s ease forwards; animation-delay: 0.22s; opacity: 0; }
  .slide.entering .agbox:nth-child(3) { animation: childReveal 0.35s ease forwards; animation-delay: 0.34s; opacity: 0; }

  .slide.entering .step:nth-child(1) { animation: childReveal 0.4s ease forwards; animation-delay: 0.15s; opacity: 0; }
  .slide.entering .step:nth-child(2) { animation: childReveal 0.4s ease forwards; animation-delay: 0.32s; opacity: 0; }

  /* Stat numbers pop in */
  .slide.entering .sn,
  .slide.entering .kn,
  .slide.entering .ps-num {
    animation: numberCount 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    animation-delay: 0.3s;
    opacity: 0;
  }

  /* Cover slide: h1 special entrance */
  .slide.entering h1 {
    animation: slideEnter 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: 0.1s;
    opacity: 0;
  }

  /* Blue accent bar on cover grows in */
  .slide.entering .bar {
    animation: lineGrow 0.6s ease forwards;
    animation-delay: 0.4s;
    width: 0;
  }

  /* Work cards stagger */
  .slide.entering .wk:nth-child(1) { animation: childRevealUp 0.38s ease forwards; animation-delay: 0.08s; opacity: 0; }
  .slide.entering .wk:nth-child(2) { animation: childRevealUp 0.38s ease forwards; animation-delay: 0.18s; opacity: 0; }
  .slide.entering .wk:nth-child(3) { animation: childRevealUp 0.38s ease forwards; animation-delay: 0.28s; opacity: 0; }
  .slide.entering .wk:nth-child(4) { animation: childRevealUp 0.38s ease forwards; animation-delay: 0.38s; opacity: 0; }
  .slide.entering .wk:nth-child(5) { animation: childRevealUp 0.38s ease forwards; animation-delay: 0.48s; opacity: 0; }

  /* Hover effects on interactive cards */
  .wc, .pk, .rc, .wk, .pill, .agbox, .ins {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .wc:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,255,0.12); }
  .pk:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(255,255,255,0.12); }
  .rc:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,255,0.15); }
  .wk:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
  .pill:hover { transform: translateY(-2px); box-shadow: 0 3px 12px rgba(0,0,255,0.1); }

  /* Nav button pulse on slide change */
  @keyframes btnPulse {
    0%   { box-shadow: 0 0 0 0 rgba(0,0,255,0.4); }
    70%  { box-shadow: 0 0 0 6px rgba(0,0,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,0,255,0); }
  }
  .deck-nav button.pulse {
    animation: btnPulse 0.4s ease;
  }

  /* Progress bar at top */
  .progress-bar {
    position: fixed;
    top: 38px;
    left: 0;
    height: 2px;
    background: var(--blue);
    transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 101;
    box-shadow: 0 0 8px rgba(0,0,255,0.5);
  }


  /* ══════════════════════════════════════
     RESPONSIVE — TABLET & MOBILE
  ══════════════════════════════════════ */

  /* ── TABLET: 768px–1059px ── */
  @media (max-width: 1059px) {

    body {
      padding: 48px 12px 24px;
      gap: 12px;
    }

    /* Slides stack vertically, lose aspect ratio, scroll naturally */
    .slide {
      aspect-ratio: unset !important;
      height: auto !important;
      min-height: unset !important;
      font-size: 14px !important;
      overflow: visible !important;
    }

    /* All grid panels become single column */
    .s1, .s2, .s3, .s5, .s6, .s7, .s10, .s14 {
      display: flex !important;
      flex-direction: column !important;
    }

    /* Left panels full width, auto height */
    .s1 .lp, .s2 .lp, .s3 .col, .s5 .lp, .s6 .col,
    .s7 .lp, .s10 .lp, .s14 .lp {
      width: 100% !important;
      min-height: 160px !important;
      padding: 24px !important;
    }

    .s1 .lp { min-height: 200px !important; }
    .s2 .lp { min-height: 180px !important; }

    /* Right panels full width */
    .s1 .rp, .s2 .rp, .s3 .col, .s5 .rp, .s6 .col,
    .s7 .rp, .s10 .rp, .s14 .rp {
      width: 100% !important;
      padding: 20px 24px !important;
    }

    /* S1 cover */
    .s1 h1 { font-size: 3em !important; }
    .s1 .deck-label { font-size: 1.1em !important; }

    /* S2 pillars: 1 col on tablet */
    .s2 .pillars { grid-template-columns: 1fr 1fr !important; }
    .s2 .stat-row { gap: 20px !important; }
    .s2 .sn { font-size: 1.6em !important; }

    /* S3 counter box */
    .s3 h2 { font-size: 1.6em !important; }
    .s3 .cb-head { font-size: 1em !important; }
    .s3 .ps-num { font-size: 2em !important; }

    /* S4 journey: 3 cols then wrap */
    .s4 { aspect-ratio: unset !important; height: auto !important; padding: 20px !important; }
    .s4 .igrid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
    .s4 .ins::after { display: none !important; }
    .s4 .top h2 { font-size: 1.4em !important; }

    /* S5 */
    .s5 .lp h2 { font-size: 1.5em !important; }

    /* S6 pain points */
    .s6 h2 { font-size: 1.4em !important; }

    /* S7 why feyth grid */
    .s7 .rp { grid-template-columns: 1fr 1fr !important; padding: 20px !important; gap: 8px !important; }
    .s7 .lp h2 { font-size: 1.8em !important; }

    /* S8 recession grid */
    .s8 { aspect-ratio: unset !important; height: auto !important; padding: 20px !important; }
    .s8 .rgrid { grid-template-columns: 1fr 1fr !important; }
    .s8 .rins { grid-column: span 2 !important; }
    .s8 .s8top h2 { font-size: 1.4em !important; }

    /* S10 texas 2-step */
    .s10 .lp h2 { font-size: 1.4em !important; }
    .s10 .kn { font-size: 1.5em !important; }

    /* S11 perks */
    .s11 { aspect-ratio: unset !important; height: auto !important; padding: 20px !important; }
    .s11 h2 { font-size: 1.6em !important; }
    .s11 .pgrid { grid-template-columns: 1fr 1fr !important; }

    /* S13 work grid */
    .s13 { aspect-ratio: unset !important; height: auto !important; padding: 20px !important; }
    .s13 .wgrid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }

    /* Milestone + A la carte slides */
    [data-n="9"], [data-n="10"] {
      aspect-ratio: unset !important;
      height: auto !important;
      padding: 20px !important;
    }

    /* Resources slide */
    [data-n="13"] {
      aspect-ratio: unset !important;
      height: auto !important;
      padding: 20px !important;
    }

    /* Previous work slide */
    [data-n="11"] {
      aspect-ratio: unset !important;
      height: auto !important;
      padding: 20px !important;
    }
    [data-n="11"] > div:nth-child(2) {
      grid-template-columns: 1fr 1fr !important;
      gap: 10px !important;
    }
    [data-n="11"] > div:nth-child(2) > div > div:first-child {
      height: 160px !important;
    }

    /* CTA */
    .s14 h2 { font-size: 2em !important; }
    .s14 .rp iframe { height: 500px !important; }

    /* Nav */
    .deck-nav { padding: 8px 16px; }
    .deck-nav .brand { font-size: 14px; }
    .deck-nav button { font-size: 10px; padding: 5px 10px; }

    /* Fullscreen on tablet: restore aspect ratio */
    body.fs .slide.active {
      height: 100vh !important;
      aspect-ratio: unset !important;
      overflow: hidden !important;
    }
  }

  /* ── MOBILE: max 767px ── */
  @media (max-width: 767px) {

