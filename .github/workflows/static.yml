<script>
  let cur = 1, total = 14, fs = false, animating = false;

  // Create progress bar
  const prog = document.createElement('div');
  prog.className = 'progress-bar';
  document.body.appendChild(prog);

  function upd() {
    document.getElementById('ctr').textContent = cur + ' / ' + total;
    prog.style.width = ((cur / total) * 100) + '%';
  }

  function go(n) {
    if (animating) return;
    const next = Math.max(1, Math.min(n, total));
    if (next === cur) return;
    animating = true;

    const current = document.querySelector('[data-n="' + cur + '"]');
    cur = next;
    const target = document.querySelector('[data-n="' + cur + '"]');
    if (!target) { animating = false; return; }

    // Exit current
    if (current && current !== target) {
      current.classList.add('exiting');
      setTimeout(() => {
        current.classList.remove('active', 'exiting', 'entering');
      }, 280);
    }

    // Enter next
    target.classList.add('active', 'entering');
    setTimeout(() => {
      target.classList.remove('entering');
      animating = false;
    }, 700);

    upd();
    if (!fs) target.scrollIntoView({ behavior: 'smooth', block: 'center' });

    // Pulse nav buttons
    document.querySelectorAll('.deck-nav button').forEach(b => {
      b.classList.add('pulse');
      setTimeout(() => b.classList.remove('pulse'), 400);
    });
  }

  function next() { go(cur + 1); }
  function prev() { go(cur - 1); }
  function toggleFS() {
    fs = !fs;
    document.body.classList.toggle('fs', fs);
  }

  // Init progress bar
  upd();

  // Trigger entering animation on first slide
  const first = document.querySelector('[data-n="1"]');
  if (first) {
    first.classList.add('entering');
    setTimeout(() => first.classList.remove('entering'), 700);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); next(); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prev(); }
    if (e.key === 'Escape' && fs) { fs = false; document.body.classList.remove('fs'); }
    if (e.key === 'f' || e.key === 'F') toggleFS();
  });


  // ── Customer Journey auto-reveal ──
  let cjTimer = null;
  function initCJ() {
    const slide = document.querySelector('[data-n="4"]');
    if (!slide) return;
    // Clear any running sequence
    if (cjTimer) clearTimeout(cjTimer);
    const cards = Array.from(slide.querySelectorAll('.cj-card'));
    // Reset all instantly
    cards.forEach(c => {
      c.style.transition = 'none';
      c.style.opacity = '0';
      c.style.transform = 'translateY(18px)';
    });
    let i = 0;
    function revealNext() {
      if (i < cards.length) {
        const c = cards[i];
        // Force reflow so transition fires
        void c.offsetWidth;
        c.style.transition = 'opacity 0.42s ease, transform 0.42s ease';
        c.style.opacity = '1';
        c.style.transform = 'translateY(0)';
        i++;
        cjTimer = setTimeout(revealNext, 500);
      }
    }
    // Small delay to let slide entrance animation start first
    cjTimer = setTimeout(revealNext, 300);
  }

  // Override go() to trigger CJ on slide 4 and blueprint on slide 7
  const _goBase = go;
  go = function(n) {
    _goBase(n);
    if (n === 4) setTimeout(initCJ, 80);
    if (n === 7) setTimeout(initBP, 100);
  };

  function initBP() {
    const svg = document.getElementById('bp-svg');
    if (!svg) return;
    svg.classList.remove('draw');
    void svg.offsetWidth; // reflow
    svg.classList.add('draw');
  }

  // Also fire on first load if starting on slide 7
  if (cur === 7) setTimeout(initBP, 300);

  // CJ triggers via go() wrapper above
</script>
